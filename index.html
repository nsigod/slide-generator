<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字转幻灯片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <h1 class="text-2xl font-semibold text-gray-900">文字转幻灯片</h1>
            <p class="mt-1 text-sm text-gray-600">粘贴文字或DeepSeek分享链接，生成Reveal.js幻灯片或Markdown文件</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Column - Input -->
            <div class="space-y-6">
                <!-- Text Input -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-medium text-gray-900 mb-4">文字输入</h2>
                    <textarea
                        id="inputText"
                        class="w-full h-48 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="粘贴要转换为幻灯片的文字..."
                    ></textarea>
                    <div class="mt-4 flex items-center space-x-4">
                        <label class="inline-flex items-center">
                            <input type="radio" class="form-radio" name="format" value="revealjs" checked onchange="updateFormat(this.value)">
                            <span class="ml-2">Reveal.js幻灯片</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" class="form-radio" name="format" value="markdown" onchange="updateFormat(this.value)">
                            <span class="ml-2">Markdown文件</span>
                        </label>
                    </div>
                    <button
                        id="generateBtn"
                        class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50"
                        onclick="generateFromText()"
                    >
                        生成幻灯片
                    </button>
                </div>

                <!-- Link Input -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-medium text-gray-900 mb-4">DeepSeek分享链接</h2>
                    <input
                        type="text"
                        id="shareUrl"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="粘贴DeepSeek分享链接..."
                    >
                    <div class="mt-4 flex space-x-2">
                        <button
                            class="flex-1 bg-gray-600 text-white py-2 px-4 rounded-md hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2"
                            onclick="parseLink()"
                        >
                            解析链接
                        </button>
                        <button
                            class="flex-1 bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2"
                            onclick="generateFromLink()"
                        >
                            直接生成
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column - Output -->
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-medium text-gray-900">输出预览</h2>
                    <div id="actionButtons" class="space-x-2" style="display: none;">
                        <button
                            class="px-3 py-1 text-sm bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
                            onclick="previewContent()"
                        >
                            预览
                        </button>
                        <button
                            class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700"
                            onclick="downloadContent()"
                        >
                            下载
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-md" style="display: none;"></div>

                <div id="outputContent" class="border-2 border-dashed border-gray-300 rounded-md p-12 text-center h-96 flex items-center justify-center">
                    <p class="text-gray-500">生成的内容将在这里显示</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let outputFormat = 'revealjs';
        let generatedContent = '';

        function updateFormat(format) {
            outputFormat = format;
        }

        async function generateFromText() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                showError('请输入文字内容');
                return;
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch('http://localhost:8001/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, output_format: outputFormat })
                });

                const data = await response.json();

                if (data.success) {
                    generatedContent = data.content;
                    displayContent(data.content);
                } else {
                    showError(data.message || '生成失败');
                }
            } catch (err) {
                showError('请求失败：' + err.message);
            } finally {
                setLoading(false);
            }
        }

        async function parseLink() {
            const url = document.getElementById('shareUrl').value.trim();
            if (!url) {
                showError('请输入DeepSeek分享链接');
                return;
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch('http://localhost:8001/api/parse-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ share_url: url })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('inputText').value = data.content;
                } else {
                    showError(data.message || '解析失败');
                }
            } catch (err) {
                showError('请求失败：' + err.message);
            } finally {
                setLoading(false);
            }
        }

        async function generateFromLink() {
            const url = document.getElementById('shareUrl').value.trim();
            if (!url) {
                showError('请输入DeepSeek分享链接');
                return;
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch('http://localhost:8001/api/generate-from-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ share_url: url, output_format: outputFormat })
                });

                const data = await response.json();

                if (data.success) {
                    generatedContent = data.content;
                    displayContent(data.content);
                } else {
                    showError(data.message || '生成失败');
                }
            } catch (err) {
                showError('请求失败：' + err.message);
            } finally {
                setLoading(false);
            }
        }

        function displayContent(content) {
            const outputDiv = document.getElementById('outputContent');
            outputDiv.className = 'border border-gray-200 rounded-md p-4 h-96 overflow-auto';
            outputDiv.innerHTML = '<pre class="whitespace-pre-wrap text-sm text-gray-700"></pre>';
            outputDiv.querySelector('pre').textContent = content;

            document.getElementById('actionButtons').style.display = 'block';
        }

        function previewContent() {
            if (!generatedContent) return;

            if (outputFormat === 'revealjs') {
                const blob = new Blob([generatedContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
            } else {
                const previewWindow = window.open('', '_blank');
                if (previewWindow) {
                    previewWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Markdown Preview</title>
                            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
                            <style>
                                body { max-width: 800px; margin: 40px auto; padding: 20px; font-family: system-ui; line-height: 1.6; }
                                pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
                                code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; }
                            </style>
                        </head>
                        <body>
                            <div id="content"></div>
                            <script>
                                document.getElementById('content').innerHTML = marked.parse(\`${generatedContent.replace(/`/g, '\\`')}\`);
                            <\/script>
                        </body>
                        </html>
                    `);
                }
            }
        }

        function downloadContent() {
            if (!generatedContent) return;

            const blob = new Blob([generatedContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = outputFormat === 'revealjs' ? 'slides.html' : 'slides.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function setLoading(loading) {
            const btn = document.getElementById('generateBtn');
            btn.disabled = loading;
            btn.innerHTML = loading ? '<span class="spinner"></span> 生成中...' : '生成幻灯片';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
